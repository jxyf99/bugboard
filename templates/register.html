{% extends "base.html" %}

{% block title %}Register - BugBoard{% endblock %}

{% block content %}
  <section class="auth-shell">
    <form class="auth-card" method="post">
      <p class="eyebrow">Start tracking</p>
      <h1>Create account</h1>

      <label for="name">Name</label>
      <input id="name" name="name" value="{{ name or '' }}" autocomplete="name" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required>

      <button class="primary-button full-width" type="submit">Create account</button>
      <p class="form-note">Already have a board? <a href="{{ url_for('login') }}">Log in</a>.</p>
    </form>
  </section>
{% endblock %}
